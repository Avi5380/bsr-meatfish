<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דוחות זד וסיכומי קופה — מתוך וואטסאפ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&family=Frank+Ruhl+Libre:wght@500;700&display=swap');

* { box-sizing: border-box; }
body { font-family: 'Heebo', system-ui, sans-serif; background: #fafaf7; color: #1a1a1a; margin: 0; line-height: 1.55; }
.container { max-width: 1040px; margin: 0 auto; padding: 20px; }
h1 { font-family: 'Frank Ruhl Libre', serif; font-size: 30px; margin: 0 0 4px; letter-spacing: -.02em; }
h2 { font-family: 'Frank Ruhl Libre', serif; font-size: 22px; margin: 24px 0 10px; padding-bottom: 6px; border-bottom: 2px solid #333; }

.topbar { background: #1a1a1a; color: white; padding: 14px 20px; }
.topbar .row { display: flex; align-items: center; justify-content: space-between; max-width: 1040px; margin: 0 auto; gap: 14px; }
.topbar h1 { font-size: 17px; color: white; font-family: 'Heebo'; margin: 0; }
.topbar a, .topbar button { color: white; text-decoration: none; background: rgba(255,255,255,.12); border: 0; font-family: inherit; font-size: 13px; font-weight: 600; padding: 7px 14px; border-radius: 7px; cursor: pointer; }
.topbar a:hover, .topbar button:hover { background: rgba(255,255,255,.2); }

.summary { background: white; border: 1px solid #e0ddd2; border-radius: 10px; padding: 16px 20px; margin: 12px 0; }
.summary .row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #ddd; font-size: 13px; }
.summary .row:last-child { border-bottom: 0; }
.summary .row .name { color: #555; }
.summary .row .count { font-weight: 700; font-variant-numeric: tabular-nums; }

.highlight {
  background: #fff8dc; border: 1px solid #d4a800; border-right: 4px solid #d4a800;
  padding: 14px 18px; border-radius: 8px; margin: 12px 0;
}
.highlight h3 { margin: 0 0 6px; font-size: 16px; color: #7a4d10; }
.highlight .quote { background: #f8f6ef; padding: 10px 14px; border-radius: 6px; white-space: pre-wrap; font-size: 13px; margin: 6px 0; }
.highlight .meta { font-size: 12px; color: #555; }

.match {
  background: white; border: 1px solid #e0ddd2; border-right: 4px solid #aaa;
  border-radius: 10px; padding: 14px 16px; margin: 10px 0;
}
.match[data-strength="high"]   { border-right-color: #c92a2a; }
.match[data-strength="medium"] { border-right-color: #b48700; }
.match[data-strength="low"]    { border-right-color: #6b6b6b; }
.match .m-head { display: flex; align-items: center; gap: 10px; font-size: 13px; margin-bottom: 8px; }
.match .m-date { font-weight: 700; }
.match .m-speaker { background: #f0ede2; padding: 3px 10px; border-radius: 6px; font-weight: 600; font-size: 12px; }
.match .m-chat { color: #888; font-size: 11px; }
.match .m-hits { display: flex; gap: 5px; flex-wrap: wrap; margin: 4px 0 6px; }
.match .m-hits .hit { background: #f0ede2; color: #555; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.match .m-hits .hit.high { background: #fce4e4; color: #8c2c2c; }
.match .m-hits .hit.medium { background: #fff5d6; color: #7a4d10; }
.match .m-body { background: #f8f6ef; padding: 10px 14px; border-radius: 4px; white-space: pre-wrap; font-size: 13px; }

mark.num { background: #fce28a; padding: 0 3px; font-weight: 700; }

.empty, .loading { padding: 40px; text-align: center; color: #888; }
</style>
</head>
<body>

<div class="topbar">
  <div class="row">
    <h1>דוחות זד וסיכומי קופה — מתוך וואטסאפ</h1>
    <div>
      <a href="/">← דוח ראשי</a>
      <a href="/case-file.html">תיק ראיות מזומן</a>
      <a href="/deliveries.html">חיובי משלוחים</a>
      <button onclick="window.print()">הדפסה</button>
    </div>
  </div>
</div>

<div class="container">

<div id="content"><div class="loading">טוען...</div></div>

</div>

<script>
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(iso) { const [y,m,d] = iso.split('-'); return `${d}/${m}/${y}`; }
function highlightNumbers(text) {
  // Highlight numbers >= 100 that look like amounts (with commas) or have ₪/שח nearby
  let out = esc(text);
  out = out.replace(/(\d{1,3}(?:,\d{3})+(?:\.\d+)?|\d{4,})\s*(?:₪|ש["']?ח|שקל)?/g, m => `<mark class="num">${m}</mark>`);
  return out;
}

async function load() {
  const r = await fetch('/z-reports.json');
  const data = await r.json();

  let html = `
    <h2>סיכום</h2>
    <div class="summary">
      <div class="row"><span class="name">סה"כ הודעות שנמצאו</span><span class="count">${data.count}</span></div>
      ${Object.entries(data.byChat).map(([c, n]) => `
        <div class="row"><span class="name">${esc(c)}</span><span class="count">${n}</span></div>
      `).join('')}
    </div>

    <h3>תבניות שזוהו</h3>
    <div class="summary">
      ${Object.entries(data.byPattern).sort((a,b)=>b[1]-a[1]).map(([p, n]) => `
        <div class="row"><span class="name">${esc(p)}</span><span class="count">${n}</span></div>
      `).join('')}
    </div>

    <div class="highlight">
      <h3>⚠ ממצאי מפתח</h3>
      <p style="font-size:13px;margin:0 0 8px">סקירה אוטומטית זיהתה 2 הודעות מפתח. בית הדין יכול לעיין בהן בנפרד:</p>
      <ol style="font-size:13px;margin:0 0 0 18px;padding:0 18px 0 0">
        <li><strong>30.6.2025 — מני</strong>: סיכום 5 חודשי מכירות (1,695,114 ₪) מול הצהרת המע"מ (אפקטיבית 51,715/חודש במקום 11,000 ₪)</li>
        <li><strong>5.3.2026 — Y</strong>: ציון שזד חודשי בתחילת 2024 בסך 50K לא דווח</li>
      </ol>
    </div>

    <h2>כל ההודעות שזוהו (לפי תאריך)</h2>
  `;

  for (const m of data.matches) {
    const hits = m.hits.map(h => `<span class="hit ${h.strength}">${esc(h.pattern)}</span>`).join('');
    const topStrength = m.hits.reduce((s, h) => h.strength === 'high' ? 'high' : (h.strength === 'medium' && s !== 'high' ? 'medium' : s), 'low');
    html += `
      <div class="match" data-strength="${topStrength}">
        <div class="m-head">
          <div class="m-date">${fmtDate(m.date)} · ${m.time}</div>
          <div class="m-speaker">${esc(m.speaker)}</div>
          <div class="m-chat">${esc(m.chat)}</div>
        </div>
        <div class="m-hits">${hits}</div>
        <div class="m-body">${highlightNumbers(m.body)}</div>
      </div>
    `;
  }

  document.getElementById('content').innerHTML = html;
}

load();
</script>
</body>
</html>
